_subdirectory: template
_templates_suffix: .jinja
_min_copier_version: "9.0"
_answers_file: .copier-answers.yml

_exclude:
  # Conditional docs
  - "{% if not is_service %}docs/operations.md{% endif %}"
  # Python project files: root layout lives at the project root,
  # component layout lives under {{ component_dir }}/.
  # Only one set is rendered depending on the python variable.
  - "{% if python != 'root' %}/pyproject.toml{% endif %}"
  - "{% if python != 'root' %}/.python-version{% endif %}"
  - "{% if python != 'root' %}/src{% endif %}"
  - "{% if python != 'root' %}/tests{% endif %}"
  - "{% if python != 'component' %}{{ component_dir }}{% endif %}"
  # Conditional CI/CD platforms
  - "{% if platform == 'github' %}.forgejo{% endif %}"
  - "{% if platform == 'forgejo' %}.github{% endif %}"
  # Conditional CD (only if is_service)
  - "{% if not is_service %}.forgejo/workflows/cd.yml{% endif %}"
  - "{% if not is_service %}.github/workflows/cd.yml{% endif %}"
  # Conditional pre-commit
  - "{% if hooks == 'none' %}.pre-commit-config.yaml{% endif %}"
  # Conditional Docker files (only if is_service)
  - "{% if not is_service %}Dockerfile{% endif %}"
  - "{% if not is_service %}docker-compose.yml{% endif %}"
  # Conditional secrets example (only if env-only)
  - "{% if secrets != 'env-only' %}.env.example{% endif %}"
  # Conditional changelog config (only if python != none)
  - "{% if python == 'none' %}cliff.toml{% endif %}"

_message_after_copy: |
  Project "{{ project_name }}" created. Next steps:

    git init && git add -A && git commit -m "chore: initial project setup"
  {%- if python == 'root' %}
    uv sync
    git add uv.lock && git commit -m "chore: lock dependencies"
  {%- elif python == 'component' %}
    cd {{ component_dir }} && uv sync && cd ..
    git add {{ component_dir }}/uv.lock && git commit -m "chore: lock dependencies"
  {%- endif %}
  {%- if hooks != 'none' %}
    pre-commit install
  {%- endif %}
  {%- if platform == 'github' %}
    git remote add origin https://github.com/{{ org }}/{{ project_name }}.git
  {%- elif platform == 'forgejo' %}
    git remote add origin {{ forgejo_url }}/{{ org }}/{{ project_name }}.git
  {%- else %}
    git remote add origin {{ forgejo_url }}/{{ org }}/{{ project_name }}.git
    git remote add github https://github.com/{{ org }}/{{ project_name }}.git
  {%- endif %}
    git push -u origin main
  {%- if platform == 'both' %}
    git push github main
  {%- endif %}

# ── Questions ─────────────────────────────────────────────────────────────────

project_name:
  type: str
  help: Project name (used in headings and as the default package name)

author_name:
  type: str
  help: Author name (optional, leave blank to omit)
  default: ""

platform:
  type: str
  help: "Target platform: forgejo, github, or both"
  choices:
    - forgejo
    - github
    - both
  default: forgejo

forgejo_url:
  type: str
  help: "Forgejo instance URL, e.g. https://codeberg.org (no trailing slash)"
  when: "{{ platform != 'github' }}"
  default: ""

org:
  type: str
  help: "GitHub/Forgejo organization or username (used in remote URLs)"
  default: ""

python:
  type: str
  help: "Python support: root (flat layout), component (under backend/), or none"
  choices:
    - root
    - component
    - none
  default: none

python_version:
  type: str
  help: Python version
  choices:
    - "3.14"
    - "3.13"
    - "3.12"
  default: "3.14"
  when: "{{ python != 'none' }}"

is_service:
  type: bool
  help: "Does this project run as a long-running service? (adds Dockerfile, docker-compose, operations.md, CD pipeline)"
  default: false

license:
  type: str
  help: License
  choices:
    - mit
    - agpl
    - proprietary
    - none
  default: mit

secrets:
  type: str
  help: "Secrets management: sops (encrypted files in repo), env-only (.env files), or none"
  choices:
    - sops
    - env-only
    - none
  default: none

hooks:
  type: str
  help: "Pre-commit hooks: minimal (whitespace/yaml/size), python (adds ruff), or none"
  choices:
    - minimal
    - python
    - none
  default: minimal
  validator: "{% if hooks == 'python' and python == 'none' %}hooks=python requires python != none{% endif %}"

component_dir:
  type: str
  help: "Subdirectory name for the Python component (only when python=component)"
  default: "backend"
  when: "{{ python == 'component' }}"

workflow_style:
  type: str
  help: "Agent workflow style: issues-prs (agent opens issues/PRs, human reviews+merges) or direct (agent stages changes, human commits)"
  choices:
    - issues-prs
    - direct
  default: issues-prs

# ── Computed variables (never asked) ──────────────────────────────────────────

package_name:
  type: str
  help: Python package name (snake_case of project_name)
  default: "{{ project_name | lower | replace('-', '_') | replace(' ', '_') | replace('.', '_') }}"
  when: false
